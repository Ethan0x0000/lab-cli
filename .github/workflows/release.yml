name: Release

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Lint source
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build CLI bundle
        run: npm run build

      - name: Pack release tarball
        run: npm pack --json > pack-result.json

      - name: Resolve package filename
        run: |
          PACKAGE_FILE=$(node -e "const fs = require('node:fs'); const result = JSON.parse(fs.readFileSync('pack-result.json', 'utf8')); process.stdout.write(result[0].filename)")
          echo "PACKAGE_FILE=$PACKAGE_FILE" >> "$GITHUB_ENV"

      - name: Upload tarball as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: |
            ${{ env.PACKAGE_FILE }}
            pack-result.json

      - name: Ensure npm token is configured
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::Missing NPM_TOKEN repository secret. Add it before publishing releases."
            exit 1
          fi

      - name: Publish package to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish "$PACKAGE_FILE" --access public

      - name: Upload tarball to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "$PACKAGE_FILE" --clobber
