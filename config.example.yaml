# LabCLI 全局配置示例文件
# 将此文件复制到 ~/.lab-cli/config.yaml 并填入实际的服务器信息
# 或运行 `labcli init --global` 进行交互式初始化

# 服务器地址（必填）
# 可以是 IP 地址或域名
host: your-server-ip

# SSH 端口（可选，默认 22）
port: 22

# 服务器用户名（必填）
username: yourname

# 认证方式（必填）
# 可选值: key（使用私钥）或 password（使用密码）
authMethod: key

# 私钥路径（可选，当 authMethod 为 key 时使用）
# 支持 ~ 符号展开为用户主目录
privateKeyPath: ~/.ssh/id_rsa

# 默认远程路径（必填）
# 用户在服务器上的主目录或工作目录
defaultRemotePath: /home/yourname

# 默认 Slurm 分区（可选）
# 如果不指定，提交任务时需要用 --partition 参数
defaultPartition: gpu
